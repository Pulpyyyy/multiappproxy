name: Update base image version

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update-base:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest base image version
        id: latest
        run: |
          TAG=$(curl -sL https://api.github.com/repos/hassio-addons/addon-base/releases/latest \
            | grep '"tag_name"' \
            | sed 's/.*"tag_name": "\(.*\)".*/\1/')
          if [ -z "$TAG" ]; then
            echo "❌ Could not fetch latest base version"
            exit 1
          fi
          # Strip leading 'v' as the registry tags don't use it
          LATEST="${TAG#v}"
          echo "VERSION=$LATEST" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "🔍 Latest base version: $LATEST"

      - name: Get current base image version
        id: current
        run: |
          CURRENT=$(grep -oP 'ghcr\.io/hassio-addons/base/amd64:\K[^"]+' multiappproxy/build.yaml | head -n 1)
          echo "VERSION=$CURRENT" >> $GITHUB_OUTPUT
          echo "📌 Current base version: $CURRENT"

      - name: Update build.yaml
        run: |
          LATEST="${{ steps.latest.outputs.VERSION }}"
          TAG="${{ steps.latest.outputs.TAG }}"
          CURRENT="${{ steps.current.outputs.VERSION }}"
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "✅ Base image already up to date ($CURRENT)"
            echo "CHANGES=false" >> $GITHUB_ENV
          else
            sed -i "s|ghcr\.io/hassio-addons/base/\([^:]*\):[^\"]*|ghcr.io/hassio-addons/base/\1:$LATEST|g" multiappproxy/build.yaml
            echo "🔄 Base version: $CURRENT → $LATEST"
            echo "- **hassio-addons/addon-base** → [$LATEST](https://github.com/hassio-addons/addon-base/releases/tag/$TAG)" >> multiappproxy/bot_changelog.md
            echo "CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Increment addon version
        if: env.CHANGES == 'true'
        run: |
          version=$(grep -E '^version:' "multiappproxy/config.yaml" | awk '{print $2}' | sed 's/"//g')
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          new_version="${major}.${minor}.${patch}"
          sed -i "s/^version: .*/version: $new_version/" "multiappproxy/config.yaml"
          echo "Version updated: $version -> $new_version"
          echo "NEW_VERSION=$new_version" >> $GITHUB_ENV

          cp multiappproxy/CHANGELOG.md multiappproxy/old_CHANGELOG.md
          echo -e "## $new_version\n" > multiappproxy/CHANGELOG.md

          if [ -f multiappproxy/next_CHANGELOG.md ] && [ -s multiappproxy/next_CHANGELOG.md ]; then
            echo "### 🚀 New Features" >> multiappproxy/CHANGELOG.md
            cat multiappproxy/next_CHANGELOG.md >> multiappproxy/CHANGELOG.md
            > multiappproxy/next_CHANGELOG.md
          fi

          echo -e "\n### 🛠️ Fixes & Updates\n" >> multiappproxy/CHANGELOG.md
          cat multiappproxy/bot_changelog.md >> multiappproxy/CHANGELOG.md
          rm multiappproxy/bot_changelog.md

          if [ -f multiappproxy/fix_CHANGELOG.md ] && [ -s multiappproxy/fix_CHANGELOG.md ]; then
            cat multiappproxy/fix_CHANGELOG.md >> multiappproxy/CHANGELOG.md
            > multiappproxy/fix_CHANGELOG.md
          fi

          echo -e "\n --- \n" >> multiappproxy/CHANGELOG.md
          cat multiappproxy/old_CHANGELOG.md >> multiappproxy/CHANGELOG.md
          rm multiappproxy/old_CHANGELOG.md

      - name: Commit and push changes
        if: env.CHANGES == 'true'
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git pull
          git add .
          git diff --cached --quiet || git commit -m "Update base image to ${{ steps.latest.outputs.VERSION }}"
          git push
