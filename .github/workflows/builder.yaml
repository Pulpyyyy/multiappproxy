name: Build and Push Docker Images

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
  workflow_call:

env:
  ADDON: multiappproxy
  REPOSITORY: pulpyyyy
  ARCHITECTURES: '["amd64", "aarch64"]'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get addon info
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ env.ADDON }}"

      - name: Clean version
        id: version
        run: echo "value=$(echo '${{ steps.info.outputs.version }}' | tr -d '\"')" >> $GITHUB_OUTPUT

      - name: Get build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.ADDON }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          context: ./${{ env.ADDON }}
          container-registry: docker.io
          container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image: docker.io/${{ env.REPOSITORY }}/${{ env.ADDON }}-${{ matrix.arch }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.init.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry: docker.io
          container-registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          container-registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          image-name: docker.io/${{ env.REPOSITORY }}/${{ env.ADDON }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
