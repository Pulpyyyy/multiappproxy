name: Release Pipeline

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write

jobs:
  update-base:
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/update-base.yml
    secrets: inherit

  autotag:
    needs: update-base
    if: always() && github.event_name == 'workflow_dispatch' && needs.update-base.result == 'success'
    uses: ./.github/workflows/autotag.yml
    secrets: inherit

  build:
    needs: autotag
    if: always() && (needs.autotag.result == 'success' || needs.autotag.result == 'skipped')
    uses: ./.github/workflows/builder.yaml
    secrets: inherit

  security-scan:
    needs: build
    if: always() && needs.build.result == 'success'
    uses: ./.github/workflows/security-scan.yml
    with:
      addon: multiappproxy
      blocking: false
    secrets: inherit

  release:
    needs: [autotag, build]
    if: always() && (needs.autotag.result == 'success' || needs.autotag.result == 'skipped') && needs.build.result == 'success'
    uses: ./.github/workflows/pre-release.yml
    with:
      addon: multiappproxy
      prerelease: false
    secrets: inherit
